name: LandLocker
version: V1.1.7
status: STABLE
message: |
  # LandLocker V1.1.7
  - Improvement with visualization when holding the modification tool by decreasing performance consumption and increasing efficiency in the process.
  - Improvement with AFK detection where it will no longer provide claim blocks for people who use AFK machines.
  - Improvement with receiving accrued claim blocks.
    - Accurate claim blocks delivery per 5 minutes in order to satisfy the specified value
    - Delivering the accrued claim blocks is no longer globally delivered. Initial timer of each players for deliveries will start when they joined the server.
  - Updated Copyright license.